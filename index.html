<!DOCTYPE html><html><head><meta charset="utf-8"><title>Compare Data</title>
<style>
body{font-family:Calibri;background:#f5f5f5;margin:20px}
table{border-collapse:collapse}th,td{border:1px solid #bbb}th{background:#217346;color:#fff;padding:6px}
input{border:none;padding:6px;width:140px}input[readonly]{background:#eee;cursor:pointer}
.bad{background:#ffb3b3;animation:blink .8s infinite}.ok{background:#c8f7c5}
@keyframes blink{50%{background:#fff}}
</style></head><body>
<table><thead><tr><th>User1</th><th>Nom1</th><th>User2</th><th>Nom2</th><th>Hasil</th></tr></thead><tbody id=b></tbody></table>
<script>
const b=document.getElementById('b');
for(let i=0;i<500;i++){let tr=document.createElement('tr');
for(let j=0;j<5;j++){let td=document.createElement('td'),inp=document.createElement('input');
if(j==4){inp.readOnly=true;inp.onclick=()=>navigator.clipboard.writeText(inp.value);}
inp.oninput=()=>{if(j<4)compare();}
inp.onpaste=function(e){e.preventDefault();let d=e.clipboardData.getData('text').trim().split(/\r?\n/).map(x=>x.split(/\t/));
let r=this.parentNode.parentNode.rowIndex-1,c=this.parentNode.cellIndex;
d.forEach((row,k)=>{let t=b.rows[r+k];if(!t)return;row.forEach((v,m)=>{let cell=t.cells[c+m];if(cell)cell.firstChild.value=v;});});compare();}
td.append(inp);tr.append(td);}b.append(tr);}
function clean(s){return s.toLowerCase().replace(/\s+/g,'')}
function compare(){
let m=new Map();
[...b.rows].forEach(r=>{let u=clean(r.cells[2].firstChild.value),n=r.cells[3].firstChild.value;if(u)m.set(u,{n,r})});
[...b.rows].forEach(r=>{
r.querySelectorAll('input').forEach(i=>i.className='');
let u=clean(r.cells[0].firstChild.value),n=r.cells[1].firstChild.value,h=r.cells[4].firstChild;
if(!u){h.value='';return;}
if(!m.has(u)){h.value=u;r.cells[0].firstChild.className='bad';r.cells[1].firstChild.className='bad';return;}
let o=m.get(u);
if((n+'').replace(/\D/g,'')!=(o.n+'').replace(/\D/g,'')){h.value=u;r.cells[1].firstChild.className='bad';o.r.cells[3].firstChild.className='bad';}
else{h.value='OK';h.className='ok';}
});
}
</script></body></html>
