<!DOCTYPE html><html><head><meta charset="utf-8"><title>Compare Data</title>
<style>
body{font-family:Calibri}table{border-collapse:collapse}th,td{border:1px solid #bbb}
th{background:#217346;color:#fff;padding:6px}input{border:none;padding:6px;width:140px}
input[readonly]{background:#eee;cursor:pointer}.bad{background:#ffb3b3;animation:b .8s infinite}.ok{background:#c8f7c5}
@keyframes b{50%{background:#fff}}
</style></head><body><button onclick="filterData()" style="padding:10px 18px;margin:10px 0;background:#217346;color:#fff;border:none;border-radius:4px;cursor:pointer">FILTER A-Z & CEK DATA</button>
<table><tr><th>User1</th><th>Nom1</th><th>User2</th><th>Nom2</th><th>Hasil</th><th>Nominal Hasil</th></tr><tbody id='tb'></tbody></table>
<script>
let tb=document.getElementById('tb');
for(let i=0;i<500;i++){let tr=document.createElement('tr');for(let j=0;j<6;j++){let td=document.createElement('td'),x=document.createElement('input');if(j>=4){x.readOnly=true;x.onclick=()=>navigator.clipboard.writeText(x.value)}x.oninput=cmp;td.append(x);tr.append(td)}tb.append(tr)}
function c(s){return s.toLowerCase().replace(/\s+/g,'')}
function d(v){return (v+'').replace(/\D/g,'')}
function cmp(){
let map=new Map();
[...tb.rows].forEach(r=>{if(c(r.cells[2].firstChild.value))map.set(c(r.cells[2].firstChild.value),r)});
[...tb.rows].forEach(r=>{
r.querySelectorAll('input').forEach(i=>i.className='');
let u=c(r.cells[0].firstChild.value),n=d(r.cells[1].firstChild.value);
let h=r.cells[4].firstChild,hn=r.cells[5].firstChild;
h.value='';hn.value='';
if(!u)return;
let rr=map.get(u);
if(!rr){h.value=r.cells[0].firstChild.value;hn.value=r.cells[1].firstChild.value;r.cells[0].firstChild.className='bad';r.cells[1].firstChild.className='bad';return;}
let n2=d(rr.cells[3].firstChild.value);
if(n!=n2){h.value=r.cells[0].firstChild.value;hn.value=rr.cells[3].firstChild.value;r.cells[1].firstChild.className='bad';rr.cells[3].firstChild.className='bad';}
else{h.value='OK';hn.value=rr.cells[3].firstChild.value;h.className='ok';hn.className='ok';}
});
}

function filterData(){
 let rows=[...tb.rows];
 function sortPair(u,n){
   let arr=rows.map(r=>({u:r.cells[u].firstChild.value.toLowerCase().trim(),nu:r.cells[u].firstChild.value,no:r.cells[n].firstChild.value}))
               .filter(x=>x.u);
   arr.sort((a,b)=>a.u.localeCompare(b.u));
   rows.forEach((r,i)=>{
      r.cells[u].firstChild.value=arr[i]?arr[i].nu:'';
      r.cells[n].firstChild.value=arr[i]?arr[i].no:'';
   });
   cmp();
}
 sortPair(0,1);
 sortPair(2,3);
}

document.querySelectorAll('#tb input').forEach(inp=>{
inp.addEventListener('paste',function(e){
e.preventDefault();
const text=(e.clipboardData||window.clipboardData).getData('text').replace(/\r/g,'');
const rows=text.split('\n').filter(r=>r.length);
const startRow=this.parentNode.parentNode.rowIndex-1;
const startCol=this.parentNode.cellIndex;
rows.forEach((line,r)=>{
 const cols=line.split('\t');
 cols.forEach((val,c)=>{
   const tr=tb.rows[startRow+r];
   if(!tr)return;
   const cell=tr.cells[startCol+c];
   if(!cell)return;
   cell.firstChild.value=val;
 });
});
cmp();
});
});

</script></body></html>
